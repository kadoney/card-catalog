name = "sapfm-embedder"
main = "src/index.js"
compatibility_date = "2024-09-23"
account_id = "ebe622eaa5b3a3581cf5664272f26f30"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "sapfm-catalog-vectors"

# --- D1 Databases ---

[[d1_databases]]
binding = "DB_SAPFM"
database_name = "sapfm"
database_id = "5cdb7abc-6f1e-4b76-906b-d6ac64a11239"

[[d1_databases]]
binding = "DB_CATALOG"
database_name = "card-catalog"
database_id = "eb944e67-5fcc-4587-8fe1-eae2a9fe3476"

# NOTE: Per-museum D1 databases (DB_MET, DB_YALE, DB_RIJKS, DB_CLEVELAND, DB_CHICAGO,
# DB_PMA, DB_SLAM, DB_WINTERTHUR) were deleted 2026-04-13 when the 8 museum D1s were
# consolidated into a single `museum-furniture` D1 (d71edf59-7f68-4595-958c-7a9eb6708c23).
# The /embed/museum endpoint is stale and will need refactoring against the unified schema.
# For now, museum vectors are already present in sapfm-catalog-vectors — re-embedding via
# this Worker requires updating MUSEUM_CONFIGS + queries in src/index.js against the new
# consolidated `objects` table in museum-furniture D1.
#
# Binding the consolidated DB so /embed/museum can be refactored later:
[[d1_databases]]
binding = "DB_MUSEUM_FURNITURE"
database_name = "museum-furniture"
database_id = "d71edf59-7f68-4595-958c-7a9eb6708c23"
