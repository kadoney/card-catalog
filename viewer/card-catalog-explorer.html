<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAPFM Card Catalog — Reference Library</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sapfm-brown: #5c3d1e;
    --sapfm-gold:  #c8922a;
    --sapfm-cream: #faf7f2;
    --sapfm-sand:  #f0ebe1;
    --sapfm-border:#d4c9b5;
    --text:        #2c1f0e;
    --text-muted:  #7a6550;
    --chip-bg:     #e8e0d0;
    --chip-active: #5c3d1e;
    --card-hover:  #f5f0e8;
  }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--sapfm-cream);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--sapfm-brown);
    color: #fff;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header .logo { font-size: 1.2rem; font-weight: bold; letter-spacing: 0.05em; }
  header .subtitle { font-size: 0.8rem; opacity: 0.7; font-style: italic; }
  header .search-wrap { flex: 1; max-width: 400px; margin-left: auto; }
  header input[type=search] {
    width: 100%; padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    background: rgba(255,255,255,0.15);
    color: #fff; font-family: inherit; font-size: 0.9rem;
  }
  header input[type=search]::placeholder { color: rgba(255,255,255,0.5); }
  header input[type=search]:focus { outline: none; background: rgba(255,255,255,0.25); }

  /* ── Main layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  aside {
    width: 220px;
    flex-shrink: 0;
    background: var(--sapfm-sand);
    border-right: 1px solid var(--sapfm-border);
    overflow-y: auto;
    padding: 12px;
  }
  .sidebar-clear {
    display: none;
    width: 100%;
    margin-bottom: 10px;
    padding: 5px 10px;
    font-family: Arial, sans-serif;
    font-size: 0.75rem;
    background: var(--sapfm-brown);
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    text-align: center;
  }
  .sidebar-clear.visible { display: block; }
  .sidebar-clear:hover { background: #4a3018; }

  .filter-section { margin-bottom: 16px; }
  .filter-section h3 {
    font-size: 0.7rem;
    font-family: Arial, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--sapfm-border);
  }
  .chip-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    font-size: 0.72rem;
    font-family: Arial, sans-serif;
    padding: 2px 8px;
    border-radius: 12px;
    background: var(--chip-bg);
    color: var(--text);
    cursor: pointer;
    border: 1px solid var(--sapfm-border);
    transition: background 0.15s, color 0.15s;
    line-height: 1.5;
  }
  .chip:hover { background: #d8cfc0; }
  .chip.active { background: var(--chip-active); color: #fff; border-color: var(--chip-active); }
  .clear-btn {
    font-size: 0.7rem; font-family: Arial, sans-serif;
    color: var(--sapfm-gold); cursor: pointer; text-decoration: underline;
    background: none; border: none; margin-top: 4px; display: none;
  }
  .clear-btn.visible { display: inline; }

  /* ── Card list ── */
  .card-list-panel {
    width: 340px;
    flex-shrink: 0;
    border-right: 1px solid var(--sapfm-border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .list-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--sapfm-border);
    font-size: 0.8rem;
    font-family: Arial, sans-serif;
    color: var(--text-muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-list { flex: 1; overflow-y: auto; }
  .card-item {
    padding: 12px 14px;
    border-bottom: 1px solid var(--sapfm-border);
    cursor: pointer;
    transition: background 0.12s;
  }
  .card-item:hover { background: var(--card-hover); }
  .card-item.selected { background: #ede5d4; border-left: 3px solid var(--sapfm-gold); }
  .card-item .card-title {
    font-size: 0.88rem;
    line-height: 1.35;
    margin-bottom: 3px;
    color: var(--text);
  }
  .card-item .card-byline {
    font-size: 0.73rem;
    font-family: Arial, sans-serif;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 5px;
  }
  .card-item .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }
  .card-item .card-meta {
    font-size: 0.75rem;
    font-family: Arial, sans-serif;
    color: var(--text-muted);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .card-item .card-meta .year { font-weight: 600; }
  .tag {
    font-size: 0.68rem;
    font-family: Arial, sans-serif;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--chip-bg);
    color: var(--text-muted);
  }
  .tag.period { background: #e2d9c8; }
  .tag.form   { background: #d9e4d9; }
  .tag.region { background: #d9dde8; }

  /* Load more */
  .load-more {
    padding: 12px;
    text-align: center;
  }
  .load-more button {
    font-family: Arial, sans-serif; font-size: 0.8rem;
    padding: 6px 20px;
    background: var(--sapfm-brown); color: #fff;
    border: none; border-radius: 4px; cursor: pointer;
  }
  .load-more button:hover { background: #4a3018; }

  /* ── Detail panel ── */
  .detail-panel {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
  }
  .detail-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%;
    font-family: Arial, sans-serif; font-size: 0.9rem;
    color: var(--text-muted); font-style: italic;
  }
  .detail-card { max-width: 680px; }
  .detail-card .dc-title {
    font-size: 1.25rem;
    line-height: 1.35;
    margin-bottom: 6px;
    color: var(--sapfm-brown);
  }
  .detail-card .dc-authors {
    font-style: italic;
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .detail-card .dc-source {
    font-family: Arial, sans-serif;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--sapfm-border);
  }
  .detail-card .dc-description {
    font-size: 0.93rem;
    line-height: 1.65;
    margin-bottom: 20px;
  }
  .detail-card .dc-tags-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 8px; align-items: center;
  }
  .detail-card .dc-tags-label {
    font-family: Arial, sans-serif;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    width: 60px;
    flex-shrink: 0;
  }
  .detail-card .dc-tag {
    font-size: 0.75rem;
    font-family: Arial, sans-serif;
    padding: 2px 8px;
    border-radius: 12px;
    background: var(--chip-bg);
    color: var(--text);
    cursor: pointer;
    border: 1px solid var(--sapfm-border);
  }
  .detail-card .dc-tag:hover { background: #d8cfc0; }
  .detail-card .dc-makers {
    font-family: Arial, sans-serif;
    font-size: 0.83rem;
    color: var(--text-muted);
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--sapfm-border);
  }
  .detail-card .dc-makers strong { color: var(--text); }
  .detail-card .dc-links {
    margin-top: 20px;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .btn-primary {
    font-family: Arial, sans-serif; font-size: 0.85rem;
    padding: 8px 20px;
    background: var(--sapfm-brown); color: #fff;
    border: none; border-radius: 4px; cursor: pointer;
    text-decoration: none; display: inline-block;
  }
  .btn-primary:hover { background: #4a3018; }
  .btn-secondary {
    font-family: Arial, sans-serif; font-size: 0.85rem;
    padding: 8px 20px;
    background: transparent; color: var(--sapfm-brown);
    border: 1px solid var(--sapfm-brown); border-radius: 4px;
    cursor: pointer; text-decoration: none; display: inline-block;
  }
  .btn-secondary:hover { background: var(--sapfm-sand); }
  .dc-contributor {
    margin-top: 12px;
    font-family: Arial, sans-serif; font-size: 0.78rem;
    color: var(--text-muted); font-style: italic;
  }

  /* ── Resizer handles ── */
  .resizer {
    width: 5px;
    flex-shrink: 0;
    cursor: col-resize;
    background: var(--sapfm-border);
    transition: background 0.15s;
    position: relative;
    z-index: 10;
  }
  .resizer:hover, .resizer.dragging { background: var(--sapfm-gold); }

  /* Loading / empty states */
  .loading-msg, .empty-msg {
    padding: 24px; text-align: center;
    font-family: Arial, sans-serif; font-size: 0.85rem;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">SAPFM Card Catalog</div>
    <div class="subtitle">Reference Library — American Period Furniture</div>
  </div>
  <div class="search-wrap">
    <input type="search" id="searchInput" placeholder="Search titles, descriptions, makers…" autocomplete="off">
  </div>
</header>

<div class="layout">

  <!-- Sidebar filters -->
  <aside id="sidebar">
    <button class="sidebar-clear" id="sidebarClearBtn" onclick="clearAllFilters()">Clear all filters</button>
    <div class="filter-section" id="filter-source_key"></div>
    <div class="filter-section" id="filter-period"></div>
    <div class="filter-section" id="filter-form"></div>
    <div class="filter-section" id="filter-region"></div>
    <div class="filter-section" id="filter-topic"></div>
  </aside>
  <div class="resizer" id="resizer-1"></div>

  <!-- Card list -->
  <div class="card-list-panel">
    <div class="list-header">
      <span id="resultCount">Loading…</span>
      <button class="clear-btn" id="clearAllBtn" onclick="clearAllFilters()">Clear all</button>
    </div>
    <div class="card-list" id="cardList"></div>
    <div class="load-more" id="loadMore" style="display:none">
      <button onclick="loadMore()">Load more</button>
    </div>
  </div>
  <div class="resizer" id="resizer-2"></div>

  <!-- Detail panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty">Select a card to read its description</div>
  </div>

</div>

<script>
const API = 'https://library-api.sapfm-admin.workers.dev';
// const API = 'http://localhost:8787'; // uncomment for local dev

const LIMIT = 40;

let vocab = {};
let filters = { period: new Set(), form: new Set(), region: new Set(), topic: new Set(), source_key: new Set() };
let searchQ = '';
let offset = 0;
let total = 0;
let cards = [];
let selectedId = null;
let searchTimer = null;

// ── Vocab / filter sidebar ──────────────────────────────────────────────────

async function loadVocab() {
  const res = await fetch(`${API}/api/library/vocab`);
  vocab = await res.json();
  renderSidebar();
}

function renderSidebar() {
  const hasFilters = hasActiveFilters();
  document.getElementById('sidebarClearBtn').classList.toggle('visible', hasFilters);
  document.getElementById('clearAllBtn').classList.toggle('visible', hasFilters);
  const sections = [
    { dim: 'source_key', label: 'Source' },
    { dim: 'period',     label: 'Period' },
    { dim: 'form',       label: 'Form' },
    { dim: 'region',     label: 'Region' },
    { dim: 'topic',      label: 'Topic' },
  ];
  for (const { dim, label } of sections) {
    const el = document.getElementById(`filter-${dim}`);
    const terms = vocab[dim] || [];
    if (!terms.length) { el.style.display = 'none'; continue; }
    el.style.display = '';
    el.innerHTML = `<h3>${label}</h3><div class="chip-list" id="chips-${dim}"></div>`;
    const list = document.getElementById(`chips-${dim}`);
    for (const t of terms) {
      const chip = document.createElement('button');
      chip.className = 'chip' + (filters[dim]?.has(t.value) ? ' active' : '');
      chip.textContent = t.label;
      chip.title = t.notes || '';
      chip.onclick = () => toggleFilter(dim, t.value);
      list.appendChild(chip);
    }
  }
}

function toggleFilter(dim, value) {
  if (!filters[dim]) filters[dim] = new Set();
  if (filters[dim].has(value)) filters[dim].delete(value);
  else filters[dim].add(value);
  renderSidebar();
  resetAndFetch();
}

function clearAllFilters() {
  for (const k of Object.keys(filters)) filters[k].clear();
  searchQ = '';
  document.getElementById('searchInput').value = '';
  renderSidebar();
  resetAndFetch();
}

// ── Card list ───────────────────────────────────────────────────────────────

function buildURL(off) {
  const params = new URLSearchParams();
  params.set('limit', LIMIT);
  params.set('offset', off);
  for (const [dim, vals] of Object.entries(filters)) {
    for (const v of vals) params.append(dim, v);
  }
  if (searchQ.trim()) params.set('q', searchQ.trim());
  return `${API}/api/library/cards?${params}`;
}

function hasActiveFilters() {
  return searchQ.trim() || Object.values(filters).some(s => s.size > 0);
}

async function resetAndFetch() {
  offset = 0;
  cards = [];
  document.getElementById('cardList').innerHTML = '<div class="loading-msg">Loading…</div>';
  await fetchCards();
}

async function fetchCards() {
  const res = await fetch(buildURL(offset));
  const data = await res.json();
  total = data.total;
  cards = offset === 0 ? data.cards : cards.concat(data.cards);
  offset += data.cards.length;
  renderCardList();
}

function renderCardList() {
  const el = document.getElementById('cardList');
  el.innerHTML = '';

  if (!cards.length) {
    el.innerHTML = '<div class="empty-msg">No cards match the current filters.</div>';
    document.getElementById('resultCount').textContent = '0 cards';
    document.getElementById('loadMore').style.display = 'none';
    return;
  }

  document.getElementById('resultCount').textContent =
    `${total} card${total !== 1 ? 's' : ''}`;

  for (const c of cards) {
    const item = document.createElement('div');
    item.className = 'card-item' + (c.id === selectedId ? ' selected' : '');
    item.dataset.id = c.id;

    const { author, title } = splitAuthorTitle(c.title);
    const displayAuthor = c.authors.length ? c.authors.join(', ') : author;
    const periodTags = c.period.slice(0, 2).map(p => `<span class="tag period">${p}</span>`).join('');
    const formTags = c.form.slice(0, 1).map(f => `<span class="tag form">${f}</span>`).join('');

    item.innerHTML = `
      <div class="card-title">${escHtml(title)}</div>
      <div class="card-byline">${displayAuthor ? escHtml(displayAuthor) + ' · ' : ''}${c.year ?? '—'}</div>
      <div class="card-tags">${periodTags}${formTags}</div>
    `;
    item.onclick = () => selectCard(c.id);
    el.appendChild(item);
  }

  document.getElementById('loadMore').style.display = offset < total ? '' : 'none';
}

function loadMore() {
  fetchCards();
}

// ── Card detail ─────────────────────────────────────────────────────────────

async function selectCard(id) {
  selectedId = id;
  // Update selected state in list
  document.querySelectorAll('.card-item').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.id) === id);
  });

  const panel = document.getElementById('detailPanel');
  panel.innerHTML = '<div class="loading-msg">Loading…</div>';

  const res = await fetch(`${API}/api/library/cards/${id}`);
  const data = await res.json();
  renderDetail(data.card);
}

function renderDetail(c) {
  const panel = document.getElementById('detailPanel');

  const { author: parsedAuthor, title: cleanTitle } = splitAuthorTitle(c.title);
  const authors = c.authors.length ? c.authors.join(', ') : (parsedAuthor || '—');
  const source = [c.source, c.year].filter(Boolean).join(', ');

  const tagsRow = (label, values, dim) => {
    if (!values.length) return '';
    const chips = values.map(v =>
      `<span class="dc-tag" onclick="applyFilterFromDetail('${dim}', '${escAttr(v)}')">${escHtml(v)}</span>`
    ).join('');
    return `<div class="dc-tags-row">
      <span class="dc-tags-label">${label}</span>${chips}
    </div>`;
  };

  const links = [];
  if (c.view_url) {
    links.push(`<a class="btn-primary" href="${escAttr(c.view_url)}" target="_blank" rel="noopener">Read Article ↗</a>`);
  }
  if (c.download_url) {
    links.push(`<a class="btn-secondary" href="${escAttr(c.download_url)}" target="_blank" rel="noopener">Download PDF</a>`);
  }
  if (!c.is_free) {
    links.push(`<span style="font-family:Arial,sans-serif;font-size:0.8rem;color:var(--text-muted);align-self:center">Citation only — available through libraries</span>`);
  }

  const makersList = c.makers.length
    ? `<div class="dc-makers"><strong>Craftsmen:</strong> ${escHtml(c.makers.join(', '))}</div>`
    : '';
  const contributor = c.contributor_name
    ? `<div class="dc-contributor">Contributed by ${escHtml(c.contributor_name)}</div>`
    : '';

  panel.innerHTML = `<div class="detail-card">
    <div class="dc-title">${escHtml(cleanTitle)}</div>
    <div class="dc-authors">${escHtml(authors)}</div>
    <div class="dc-source">${escHtml(source)}</div>
    <div class="dc-description">${escHtml(c.description)}</div>
    ${tagsRow('Period', c.period, 'period')}
    ${tagsRow('Form', c.form, 'form')}
    ${tagsRow('Region', c.region, 'region')}
    ${tagsRow('Topic', c.topic, 'topic')}
    ${makersList}
    ${links.length ? `<div class="dc-links">${links.join('')}</div>` : ''}
    ${contributor}
  </div>`;
}

function applyFilterFromDetail(dim, value) {
  if (!filters[dim]) filters[dim] = new Set();
  filters[dim].add(value);
  renderSidebar();
  resetAndFetch();
}

// ── Search ──────────────────────────────────────────────────────────────────

document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchQ = e.target.value;
  searchTimer = setTimeout(() => resetAndFetch(), 350);
});

// ── Author/title split ────────────────────────────────────────────────────────
// Chipstone titles were scraped with author name concatenated onto the title.
// Detect the CamelCase junction (lowercase immediately before uppercase) to split.

function splitAuthorTitle(raw) {
  if (!raw) return { author: '', title: raw };
  const slice = raw.slice(5); // skip first 5 chars to avoid splitting short names
  // Match: lowercase/comma/period immediately before uppercase OR opening quote mark
  const m = slice.match(/[a-z,\.](?=[A-Z\u201C\u2018"])/);
  if (m) {
    const pos = m.index + 5 + 1; // +1: split after the lowercase char
    return { author: raw.slice(0, pos).trim(), title: raw.slice(pos).trim() };
  }
  return { author: '', title: raw };
}

// ── Utilities ───────────────────────────────────────────────────────────────

function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function escAttr(s) { return escHtml(s); }

// ── Resizable panels ─────────────────────────────────────────────────────────

(function() {
  const sidebar   = document.getElementById('sidebar');
  const listPanel = document.querySelector('.card-list-panel');

  // Restore saved widths
  sidebar.style.width   = (parseInt(localStorage.getItem('cc-sidebar-w')) || 220) + 'px';
  listPanel.style.width = (parseInt(localStorage.getItem('cc-list-w'))    || 340) + 'px';

  function attachResizer(id, panel, storageKey, min, max) {
    document.getElementById(id).addEventListener('mousedown', e => {
      e.preventDefault();
      const startX = e.clientX;
      const startW = panel.offsetWidth;
      e.target.classList.add('dragging');
      document.body.style.cursor    = 'col-resize';
      document.body.style.userSelect = 'none';

      function onMove(ev) {
        const w = Math.min(max, Math.max(min, startW + ev.clientX - startX));
        panel.style.width = w + 'px';
        localStorage.setItem(storageKey, w);
      }
      function onUp() {
        e.target.classList.remove('dragging');
        document.body.style.cursor    = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  attachResizer('resizer-1', sidebar,   'cc-sidebar-w', 140, 400);
  attachResizer('resizer-2', listPanel, 'cc-list-w',    200, 560);
})();

// ── Init ─────────────────────────────────────────────────────────────────────

(async () => {
  await loadVocab();
  await resetAndFetch();
})();
</script>
</body>
</html>
